services:
  scenario-runner:
    build:
      context: .
      dockerfile: Dockerfile
    image: scenario-runner:latest
    container_name: scenario-runner
    restart: unless-stopped

    # host network: 컨테이너가 호스트 네트워크를 공유하므로
    #   1) uvicorn 이 호스트의 ${PORT} 에 직접 bind
    #   2) 컨테이너 내부에서 localhost:6443 = 호스트 K3s API
    # 별도 포트 매핑 / extra_hosts 불필요.
    network_mode: host

    command:
      - "uv"
      - "run"
      - "--no-dev"
      - "uvicorn"
      - "app.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "${PORT:-8090}"

    volumes:
      # 호스트의 kubeconfig 를 read-only 로 노출. 컨테이너 안에서도
      # 호스트와 동일한 경로(/home/nkia/.kube)로 보이게 해서 NKIAAI-480
      # 스크립트들이 `export KUBECONFIG=/home/nkia/.kube/config` 를 그대로
      # 쓸 수 있게 한다. 스크립트 수정을 피하기 위한 선택.
      - ${KUBECONFIG_HOST_PATH:-/home/nkia/.kube}:/home/nkia/.kube:ro

      # 시나리오 스크립트는 레포 내부(scenarios/services/<name>/scripts/) 에 포함.
      # 기본값은 plopvape-shop 서비스. 다른 서비스로 바꾸려면 .env 에서 SCRIPTS_HOST_PATH 오버라이드.
      - ${SCRIPTS_HOST_PATH:-./scenarios/services/plopvape-shop/scripts}:/app/scripts:ro

      # service-spec.yaml 카탈로그 — scenarios.py 가 <repo>/scenarios/services/*/service-spec.yaml glob.
      # Dockerfile 이 scenarios/ 를 COPY 안 하므로 호스트의 testbed-specific dir 만 mount.
      # ⚠️ 전체 scenarios/ mount 시 testbed 간 ID 충돌 (모두 01~04 사용) → 가장 마지막 sort 결과만 노출.
      # testbed-별 격리: TESTBED_NAME env 가 가리키는 단일 testbed dir 만 노출.
      - ./scenarios/services/${TESTBED_NAME:-plopvape-shop}:/app/scenarios/services/${TESTBED_NAME:-plopvape-shop}:ro

      # 실행 로그를 호스트에 보존 (컨테이너 재시작 시에도 유지)
      - ${LOGS_HOST_PATH:-./logs}:/app/logs:rw

      # 호스트 docker daemon socket. scenario-02 가 pg-mock 컨테이너를
      # start/stop 하는 데 사용. 보안: 컨테이너가 호스트의 모든 docker
      # 작업을 root 권한으로 수행 가능하므로 내부 신뢰 환경에서만 사용.
      - /var/run/docker.sock:/var/run/docker.sock:rw

    environment:
      - KUBECONFIG=/home/nkia/.kube/config
      - SCRIPT_DIR=/app/scripts
      - LOG_DIR=/app/logs
      - STATIC_DIR=/app/static

    # 선택: 기본 stdout/stderr 로깅 (docker logs scenario-runner 로 확인)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
